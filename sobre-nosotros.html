<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Academia | Fightermat Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bw-filter { filter: grayscale(100%); transition: 0.7s; }
        .bw-filter:hover { filter: grayscale(0%); }
        
        /* Estilos personalizados para el carrusel */
        .swiper { width: 100%; height: 500px; }
        .swiper-slide img { width: 100%; height: 100%; object-cover: cover; }
        .swiper-button-next, .swiper-button-prev { color: white !important; }
        .swiper-pagination-bullet { background: white !important; }
    </style>
</head>
<body class="bg-black text-white">

    <nav class="fixed w-full z-50 bg-black/90 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter uppercase italic">FIGHTERMAT</a>
            <div class="hidden md:flex space-x-8 font-bold text-xs uppercase tracking-[0.2em]">
                <a href="index.html" class="hover:text-zinc-400 transition">Inicio</a>
                <a href="sobre-nosotros.html" class="text-zinc-400">Sobre Nosotros</a>
                <a href="#" class="hover:text-zinc-400 transition">Clases</a>
                <a href="#" class="hover:text-zinc-400 transition">Cuotas</a>
            </div>
            <a href="#" class="bg-white text-black px-6 py-2 font-black text-xs uppercase tracking-widest hover:bg-zinc-300 transition">Contacto</a>
        </div>
    </nav>

    <section class="relative h-[70vh] flex items-end pb-20 px-6 overflow-hidden">
        <img src="img/foto-equipo.jpeg" 
             class="absolute inset-0 w-full h-full object-cover z-0 bw-filter" alt="Fightermat Local">
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent z-10"></div>
        
        <div class="max-w-7xl mx-auto w-full z-20">
            <h1 class="text-6xl md:text-8xl font-black uppercase italic tracking-tighter leading-none">
                NUESTRA <br><span class="text-zinc-500 font-light">CASA</span>
            </h1>
        </div>
    </section>

    <section class="py-24 bg-white text-black text-center px-6">
        <div class="max-w-3xl mx-auto">
            <h2 class="text-xs font-black uppercase tracking-[0.5em] text-zinc-400 mb-6">Miranda de Ebro</h2>
            <p class="text-2xl md:text-4xl font-bold leading-tight tracking-tight uppercase">
                Instalaciones de primer nivel diseñadas para el alto rendimiento y la seguridad de nuestros alumnos.
            </p>
            <div class="w-20 h-1 bg-black mx-auto mt-10"></div>
        </div>
    </section>

    <section class="py-10 bg-zinc-950">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide bw-filter">
                    <img src="img/instalaciones1.jpeg" alt="Tatami 1">
                </div>
                <div class="swiper-slide bw-filter">
                    <img src="img/instalaciones2.jpeg" alt="Zona de pesas">
                </div>
                <div class="swiper-slide bw-filter">
                    <img src="img/instalaciones3.jpeg" alt="Vestuarios">
                </div>
                <div class="swiper-slide bw-filter">
                    <img src="img/instalaciones4.jpeg" alt="Vestuarios">
                </div>
                <div class="swiper-slide bw-filter">
                    <img src="img/instalaciones5.jpeg" alt="Vestuarios">
                </div>
            </div>
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <div class="swiper-pagination"></div>
        </div>
    </section>

    <footer class="bg-black py-12 border-t border-white/5 text-center">
        <p class="text-zinc-600 text-[10px] tracking-[0.4em] uppercase">FIGHTERMAT ACADEMY • ESTRENO 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiper = new Swiper(".mySwiper", {
            slidesPerView: 1.2, // Se ve un poco de la siguiente foto (estético)
            centeredSlides: true,
            spaceBetween: 30,
            loop: true,
            autoplay: { delay: 3000 },
            pagination: { el: ".swiper-pagination", clickable: true },
            navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
            breakpoints: {
                768: { slidesPerView: 2.5 } // En PC se ven más fotos a la vez
            }
        });
    </script>
</body>
</html>
